<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkout – Protean Earth</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; }
        .form-group input, .form-group select { width: 100%; padding: 0.75rem; font-size: 1rem; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        .payment-btn {
            display: block;
            width: 100%;
            padding: 16px;
            margin: 12px 0;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: transform 0.2s;
        }
        .payment-btn:hover { transform: translateY(-2px); }
        .venmo { background: #008CFF; color: white; }
        .cashapp { background: #FFDC00; color: black; }
    </style>
</head>
<body>
    <div class="banner">Free shipping on orders $30+</div>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo"><img src="logo.svg" alt="Protean Earth" class="logo-img" /><span>Protean Earth</span></a>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Checkout</h1>
            <p>Complete your order.</p>
        </div>
    </section>

    <section class="container" style="margin-top: 2rem;">
        <div class="card" style="max-width: 500px; margin: 0 auto;">
            <div class="form-group">
                <label for="product">Select Magnet Pack</label>
                <select id="product" onchange="updateTotal()">
                    <option value="6pack" data-price="30">6-Pack – $30</option>
                    <option value="12pack" data-price="50">12-Pack – $50</option>
                    <option value="single" data-price="12">Single Magnet – $12</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone">Your Phone Number</label>
                <input type="tel" id="phone" placeholder="3035551234" />
            </div>

            <div style="margin: 20px 0; padding: 16px; background: #f0f7ff; border-radius: 8px; text-align: center;">
                <strong>Total: $<span id="total-amount">30</span></strong>
            </div>

            <button type="button" class="payment-btn venmo" onclick="openVenmo()">📱 Pay with Venmo</button>
            <button type="button" class="payment-btn cashapp" onclick="openCashApp()">💵 Pay with CashApp</button>
            
            <p style="text-align: center; color: #666; margin-top: 20px;">
                After payment, we'll contact you to confirm your design!
            </p>
        </div>
    </section>

    <footer class="site-header">
        <div class="container">
            <p>&copy; 2026 Protean Earth. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const VENMO_USERNAME = 'sunnydandee';
        const CASHAPP_TAG = '$proteanEARTH';
        
        function updateTotal() {
            const select = document.getElementById('product');
            const option = select.options[select.selectedIndex];
            document.getElementById('total-amount').textContent = option.dataset.price;
        }
        
        function openVenmo() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                alert('Please enter your phone number first');
                return;
            }
            const amount = document.getElementById('total-amount').textContent;
            const product = document.getElementById('product').value;
            const url = 'https://venmo.com/' + VENMO_USERNAME + '?txn=pay&amount=' + amount + '&note=PhotoMagnet' + product + 'Ref' + phone;
            window.open(url, '_blank');
        }
        
        function openCashApp() {
            const phone = document.getElementById('phone').value.trim();
            if (!phone) {
                alert('Please enter your phone number first');
                return;
            }
            const amount = document.getElementById('total-amount').textContent;
            const product = document.getElementById('product').value;
            const url = 'https://cash.app/' + CASHAPP_TAG + '/' + amount + '?note=PhotoMagnet' + product;
            window.open(url, '_blank');
        }
    </script>
</body>
</html>
