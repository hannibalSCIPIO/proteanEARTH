kind = "web"
previewPath = "/"
title = "Custom Photo Magnets"
version = "1.0.0"
id = "artifacts/magnet-shop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18140

[services.development]
run = "pnpm --filter @workspace/magnet-shop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/magnet-shop", "run", "build" ]
publicDir = "artifacts/magnet-shop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18140"
BASE_PATH = "/"
